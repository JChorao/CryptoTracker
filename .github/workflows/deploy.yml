name: Deploy Web App (Docker Mode)

on:
  push:
    branches:
      - Production # Ajustado para a tua branch de produção

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔐 Login na Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🐳 Login no Azure Container Registry (ACR)
        run: |
          az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: 🛠️ Build e Push da Imagem Docker
        run: |
          # Obter o servidor de login do ACR automaticamente
          ACR_SERVER=$(az acr show --name ${{ secrets.AZURE_ACR_NAME }} --query loginServer -o tsv)
          
          # Construir a imagem usando o Dockerfile da raiz
          docker build -t $ACR_SERVER/cryptotracker:latest .
          
          # Enviar para o registo na Azure
          docker push $ACR_SERVER/cryptotracker:latest

      - name: 🚀 Deploy para Azure App Service (Contentor)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          # Especifica a imagem do ACR em vez do diretório local
          images: '${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cryptotracker:latest'