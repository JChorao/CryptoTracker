name: Deploy Web App e Docker Reports

on:
  push:
    branches:
      - Production

jobs:
  deploy-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔐 Login na Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: 🚀 Deploy App Service (Código Nativo)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}

  build-reports-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔐 Login na Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🐳 Docker Login no ACR
        run: |
          # Obtém a password do ACR para o docker login
          ACR_PASSWORD=$(az acr repository show-credentials --name ${{ secrets.AZURE_ACR_NAME }} --query password -o tsv || az acr login --name ${{ secrets.AZURE_ACR_NAME }} --expose-token --query accessToken -o tsv)
          echo "Logging in to ${{ secrets.AZURE_ACR_NAME }}.azurecr.io"
          az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: 🐳 Build e Push de Relatórios
        run: |
          docker build -t ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/crypto-reports:latest .
          docker push ${{ secrets.AZURE_ACR_NAME }}.azurecr.io/crypto-reports:latest