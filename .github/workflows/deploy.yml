name: Deploy CryptoTracker → Azure App Service

on:
  push:
    branches:
      - main   # dispara sempre que há push na branch main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: ⚙️ Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Instalar dependências
      - name: 📦 Instalar dependências
        run: npm ci

      # 4. Deploy para Azure App Service
      - name: 🚀 Deploy para Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}         # nome do App Service no Azure
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}  # perfil de publicação do Azure
          package: .