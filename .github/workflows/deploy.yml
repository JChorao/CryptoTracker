name: Deploy Web App (Docker Mode)

on:
  push:
    branches:
      - Production 

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      - name: 🔐 Login na Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: 🐳 Login no Azure Container Registry (ACR)
        run: |
          az acr login --name ${{ secrets.AZURE_ACR_NAME }}

      - name: 🛠️ Build e Push da Imagem Docker
        run: |
          ACR_SERVER=${{ secrets.AZURE_ACR_NAME }}.azurecr.io
          # Se o Dockerfile estiver numa subpasta, altera o '.' para o caminho da pasta
          docker build -t $ACR_SERVER/cryptotracker:latest .
          docker push $ACR_SERVER/cryptotracker:latest

      - name: 🚀 Deploy para Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_APP_NAME }}
          images: '${{ secrets.AZURE_ACR_NAME }}.azurecr.io/cryptotracker:latest'