# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - cryptotracker-app-17541

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: acrcrypto17541.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4E07A0670B4446A890DEE7D85EB6EE75 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_D5F2AF972FB44C40ADCC0488DD4C44CF }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: acrcrypto17541.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4E07A0670B4446A890DEE7D85EB6EE75 }}/cryptotracker:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F8A5E6D42B10453A84C399CD4CAAB4A6 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_0E344FEFD5284390AEF4EDFD9E480156 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0D63ECDA48DB4582BB3785A1C843A5E8 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'cryptotracker-app-17541'
          slot-name: 'Production'
          images: 'acrcrypto17541.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_4E07A0670B4446A890DEE7D85EB6EE75 }}/cryptotracker:${{ github.sha }}'
          